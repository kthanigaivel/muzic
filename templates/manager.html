<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora - Song Manager</title>
    <link rel="icon" type="image/x-icon" href="/static/images/music.png">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding-top: 90px;
            min-height: 100vh;
        }

        /* ==========================================
           FIXED TOP NAVIGATION MENU STYLES
           ========================================== */
        .top-nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #181818;
            border-bottom: 1px solid #282828;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.3rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .menu {
            display: flex;
            align-items: center;
        }

        .menu ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .menu li {
            padding: 8px 16px;
            background-color: #282828;
            color: #ffffff;
            white-space: nowrap;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            user-select: none;
        }

        .menu li:hover {
            background-color: #1DB954;
            color: #000000;
        }

        /* ==========================================
           PAGE CONTENT CONTAINER
           ========================================== */
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px 60px 20px;
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .action-header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #ffffff;
        }

        /* Delete Button */
        .delete-btn {
            background: #ef4444;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .delete-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Search Bar Component */
        .search-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .search-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            width: 20px;
            height: 20px;
            color: #9ca3af;
            pointer-events: none;
        }

        .search {
            width: 100%;
            padding: 12px 16px 12px 44px;
            font-size: 15px;
            color: #ffffff;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.2s ease-in-out;
        }

        .search:focus {
            border-color: #1DB954;
        }

        .search-button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            color: #000000;
            background-color: #1DB954;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .search-button:hover {
            background-color: #1ed760;
        }

        /* Song List Component */
        #song-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            background: #1e1e1e;
            border: 1px solid #282828;
            border-radius: 10px;
            transition: background-color 0.2s ease;
        }

        .song-item:hover {
            background-color: #252525;
        }

        .song-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #1DB954;
        }

        .song-item img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #282828;
        }

        .song-details {
            flex: 1;
            min-width: 0;
        }

        .song-details strong {
            display: block;
            font-size: 15px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-details small {
            color: #888888;
            font-size: 13px;
        }

        /* Responsive Layout Adjustments */
        @media (max-width: 680px) {
            body {
                padding-top: 130px;
            }

            .top-nav-wrapper {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
            }

            .menu {
                width: 100%;
            }

            .menu ul {
                overflow-x: auto;
                width: 100%;
                padding-bottom: 4px;
            }
        }
    </style>
</head>

<body>

    <!-- FIXED TOP NAVIGATION BAR -->
    <div class="top-nav-wrapper">
        <div class="header">
            <h1>
                <img id="profile-image" src="/static/images/trash.png" alt="Trash Logo" onerror="this.src='/static/images/music.png'">
                Velora Song Manager
            </h1>
        </div>

        <nav class="menu">
            <ul>
                <li onclick="window.location.href='/';">🏠 Home</li>
                <li onclick="window.location.href='/dash';">📊 Dashboard</li>
                <li onclick="window.location.href='/download';">🎵 Fetch</li>
                <li onclick="window.location.href='/default';">👤 Profile</li>
            </ul>
        </nav>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
        
        <div class="action-header">
            <h2>Available Songs</h2>
            <button id="delete-btn" class="delete-btn">
                🗑 Delete Selected Songs
            </button>
        </div>

        <form class="search-container" id="search-form">
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input id="search" class="search" type="search" placeholder="Search for tracks, artists..."
                    aria-label="Search" oninput="filterSongs()">
            </div>
            <button type="submit" class="search-button">Search</button>
        </form>

        <ul id="song-list"></ul>
    </div>

    <script>
        const TOKEN = localStorage.getItem("token");

        let songs = [];
        let filteredSongs = [];

        // Global set to retain selections across search filters
        const selectedSongIds = new Set();

        // Fetch Songs from API
        async function fetchSongs() {
            try {
                const response = await fetch(`/songs`, {
                    headers: {
                        "Accept": "application/json",
                        "Authorization": `Bearer ${TOKEN}`
                    }
                });

                if (response.status === 401) {
                    window.location.href = "/default";
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Failed to load songs (${response.status})`);
                }

                songs = await response.json();
                filteredSongs = [...songs];
                renderSongs(filteredSongs);

            } catch (err) {
                console.error(err);
                alert(err.message);
            }
        }

        // Render Song List
        function renderSongs(songList) {
            const list = document.getElementById("song-list");
            list.innerHTML = "";

            if (songList.length === 0) {
                list.innerHTML = `<li style="padding: 30px; text-align: center; color: #888888;">No songs found.</li>`;
                return;
            }

            songList.forEach(song => {
                const li = document.createElement("li");
                li.className = "song-item";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.className = "song-checkbox";
                checkbox.dataset.id = song.youtube_id;

                // Restore checked state if ID exists in Set
                checkbox.checked = selectedSongIds.has(song.youtube_id);

                const img = document.createElement("img");
                img.src = song.cover_url || `/media/${song.youtube_id}.jpg`;
                img.alt = song.filename || "";
                img.onerror = () => {
                    img.src = "/static/images/default-cover.png";
                };

                const details = document.createElement("div");
                details.className = "song-details";
                details.innerHTML = `
                    <strong>${song.filename.split("|").slice(1).join(" ") || song.filename}</strong>
                    <small>ID: ${song.youtube_id}</small>
                `;

                li.appendChild(checkbox);
                li.appendChild(img);
                li.appendChild(details);

                list.appendChild(li);
            });
        }

        // Handle Checkbox Selection
        document.getElementById("song-list").addEventListener("change", (e) => {
            if (e.target.classList.contains("song-checkbox")) {
                const songId = e.target.dataset.id;
                if (e.target.checked) {
                    selectedSongIds.add(songId);
                } else {
                    selectedSongIds.delete(songId);
                }
            }
        });

        // Filter Songs Function
        function filterSongs() {
            const searchInput = document.getElementById("search");
            if (!searchInput) return;

            const q = searchInput.value.toLowerCase().trim();
            filteredSongs = songs.filter(song =>
                song.filename.toLowerCase().includes(q) ||
                song.youtube_id.toLowerCase().includes(q)
            );

            renderSongs(filteredSongs);
        }

        // Prevent Page Reload on Search Form Submit
        document.getElementById("search-form").addEventListener("submit", (e) => {
            e.preventDefault();
            filterSongs();
        });

        // Delete Selected Songs Action
        document.getElementById("delete-btn").addEventListener("click", async () => {
            const btn = document.getElementById("delete-btn");

            if (selectedSongIds.size === 0) {
                alert("Select at least one song to delete.");
                return;
            }

            if (!confirm(`Are you sure you want to delete ${selectedSongIds.size} selected song(s)?`)) {
                return;
            }

            const youtube_ids = Array.from(selectedSongIds);

            btn.disabled = true;
            btn.textContent = "Deleting...";

            try {
                const response = await fetch(`/admin/delete`, {
                    method: "DELETE",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        "Authorization": `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({ youtube_ids })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || "Delete failed");
                }

                alert(result.message || "Deleted successfully!");

                // Remove deleted songs from local state
                songs = songs.filter(song => !selectedSongIds.has(song.youtube_id));
                filteredSongs = filteredSongs.filter(song => !selectedSongIds.has(song.youtube_id));
                selectedSongIds.clear();

                renderSongs(filteredSongs);

            } catch (err) {
                console.error(err);
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "🗑 Delete Selected Songs";
            }
        });

        // Initialize Fetch
        fetchSongs();
    </script>

</body>

</html>
