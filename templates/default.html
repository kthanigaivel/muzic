<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/x-icon" href="/static/images/music.png">

    <title>Muzic App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #121212;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px
        }

        .card {
            background: #181818;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .5)
        }

        .logo {
            color: #1DB954;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px
        }

        h2 {
            text-align: center;
            margin-bottom: 10px
        }

        .subtitle {
            text-align: center;
            color: #b3b3b3;
            margin-bottom: 30px
        }

        .view {
            display: none
        }

        .view.active {
            display: block
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: none;
            border-radius: 10px;
            background: #282828;
            color: #fff
        }

        input:focus {
            outline: 2px solid #1DB954
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: #1DB954;
            color: #fff;
            font-weight: bold;
            cursor: pointer
        }

        button:disabled {
            opacity: .6
        }

        #status {
            margin-top: 15px;
            text-align: center;
            min-height: 22px
        }

        .success {
            color: #1DB954
        }

        .error {
            color: #ff6666
        }

        .register {
            text-align: center;
            margin-top: 20px;
            color: #b3b3b3
        }

        .register a {
            color: #1DB954;
            text-decoration: none
        }

        #profileView p {
            margin: 15px 0
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="logo">🎵 MUZIC</div>
            <div id="authView" class="view active">
                <h2 id="formTitle">Login</h2>
                <p class="subtitle" id="subtitle">Welcome back to Muzic</p>
                <input id="username" placeholder="Username">
                <input id="email" type="email" placeholder="Email" style="display:none">
                <input id="password" type="password" placeholder="Password">
                <button id="mainBtn">Login</button>
                <div id="status"></div>
                <p class="register"><span id="switchText">Don't have an account?</span> <a href="#" id="switch"><span
                            id="modeText">Register</span></a></p>
            </div>
            <div id="profileView" class="view">
                <h2>Your Profile</h2>

                <p><strong>Username:</strong> <span id="profUser"></span></p>
                <p><strong>Email:</strong> <span id="profEmail"></span></p>

                <button id="homeBtn">🏠 Back to Home</button>

                <button id="logoutBtn" style="margin-top:15px;background:#ff4d4d;">
                    Logout
                </button>
            </div>


        </div>
    </div>
    <script>
        const API_URL = window.location.origin; 
        let isLogin = true;
        const $ = id => document.getElementById(id);
        function show(m, e = false) { const s = $("status"); s.innerText = m; s.className = e ? "error" : "success"; }
        function toggleMode() {
            isLogin = !isLogin;
            $("formTitle").innerText = isLogin ? "Login" : "Create Account";
            $("subtitle").innerText = isLogin ? "Welcome back to Muzic" : "Create your Muzic account";
            $("mainBtn").innerText = isLogin ? "Login" : "Register";
            $("modeText").innerText = isLogin ? "Register" : "Login";
            $("switchText").innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            $("email").style.display = isLogin ? "none" : "block";
            $("username").placeholder = isLogin ? "Username" : "Choose a username";
            $("password").placeholder = isLogin ? "Password" : "Create a password";
            $("username").value = ""; $("email").value = ""; $("password").value = ""; show("");
        }
        $("switch").onclick = (e) => { e.preventDefault(); toggleMode(); }
        $("mainBtn").onclick = handleAuth; $("logoutBtn").onclick = logout;
        document.addEventListener("keydown", e => { if (e.key === "Enter" && $("authView").classList.contains("active")) handleAuth(); });
        async function handleAuth() {
            const d = { username: $("username").value.trim(), password: $("password").value };
            if (!d.username || !d.password) return show("Username and password required", true);
            if (!isLogin) { d.email = $("email").value.trim(); if (!d.email) return show("Email required", true); }
            const b = $("mainBtn"); b.disabled = true; b.textContent = isLogin ? "Logging in..." : "Registering...";
            try {
                const r = await fetch(API_URL + (isLogin ? "/auth/login" : "/auth/register"), { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(d) });
                const j = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(j.detail || "Request failed");
                if (isLogin) {
                    localStorage.setItem("token", j.access_token);

                    show("Login successful! Redirecting...");

                    await showProfile();

                    setTimeout(() => {
                        window.location.href = API_URL;
                    }, 0);
                } else { show("Registration successful"); toggleMode(); }
            }
            catch (err) { show(err.message || "Server error", true) }
            finally { b.disabled = false; b.textContent = isLogin ? "Login" : "Register"; }
        }
        async function showProfile() {
            const t = localStorage.getItem("token"); if (!t) return;
            try {
                const r = await fetch(API_URL + "/auth/me", { headers: { Authorization: `Bearer ${t}` } });
                if (!r.ok) throw Error(); const u = await r.json(); $("authView").classList.remove("active"); $("profileView").classList.add("active"); $("profUser").textContent = u.username; $("profEmail").textContent = u.email;
            }
            catch { localStorage.removeItem("token"); }
        }
        function logout() { if (confirm("Logout?")) { localStorage.removeItem("token"); location.reload(); } }
        window.onload = () => { if (localStorage.getItem("token")) showProfile(); }

        $("homeBtn").onclick = () => {
            window.location.href = API_URL;
        };


    </script>
</body>

</html>
