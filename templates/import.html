<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora • Fetch Music</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 550px;
            background: #181818;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .card-header h2 {
            color: #1DB954;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .back {
            display: inline-block;
            padding: 10px 18px;
            background: #282828;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            transition: .2s;
        }

        .back:hover {
            background: #1DB954;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #282828;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            margin-bottom: 20px;
        }

        input:focus {
            outline: 2px solid #1DB954;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: #1DB954;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .2s;
        }

        button:hover:not(:disabled) {
            opacity: .9;
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            line-height: 1.7;
            min-height: 40px;
        }

        .success {
            color: #1DB954;
        }

        .error {
            color: #ff6666;
        }

        small {
            color: #b3b3b3;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="card-header">

            <h2>🎵 Fetch YouTube</h2>

            <div class="actions">

                <a href="/" class="back">
                    🏠 Home
                </a>

                <a href="#" class="back" onclick="logout(); return false;">
                    🚪 Logout
                </a>

            </div>

        </div>

        <input id="url" type="url" placeholder="Paste YouTube Video or Playlist URL">

        <button id="fetchBtn">
            🎵 Fetch
        </button>

        <div id="status"></div>
        <script>
            const token =
                localStorage.getItem("token") ||
                localStorage.getItem("access_token");

            if (!token) {
                alert("Please login first.");
                window.location.href = "/user/default";
            }

            const urlInput = document.getElementById("url");
            const status = document.getElementById("status");
            const fetchBtn = document.getElementById("fetchBtn");

            window.onload = () => {
                urlInput.focus();
            };

            fetchBtn.addEventListener("click", fetchMusic);

            document.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    fetchMusic();
                }
            });

            function logout() {
                if (!confirm("Are you sure you want to logout?")) {
                    return;
                }

                localStorage.removeItem("token");
                localStorage.removeItem("access_token");

                window.location.href = "/user/default";
            }

            function setStatus(message, type = "") {
                status.innerHTML = `<div class="${type}">${message}</div>`;
            }

            async function fetchMusic() {

                const url = urlInput.value.trim();

                status.innerHTML = "";

                if (!url) {
                    setStatus("Please enter a YouTube URL.", "error");
                    return;
                }

                fetchBtn.disabled = true;
                fetchBtn.innerHTML = "⏳ Fetching...";

                try {

                    const response = await fetch(
                        "/fetch/youtube?url=" + encodeURIComponent(url),
                        {
                            method: "POST",
                            headers: {
                                Authorization: "Bearer " + token
                            }
                        }
                    );

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.detail || "Fetch failed.");
                    }

                    urlInput.value = "";

                    if (data.type === "playlist") {

                        setStatus(`
                ✅ Playlist downloaded successfully.<br><br>

                <strong>${data.playlist}</strong><br>

                ${data.count} song(s) processed.

                ${data.path
                                ? `<br><small>Saved to: ${data.path}</small>`
                                : ""
                            }
            `, "success");

                    } else {

                        setStatus(`
                ✅ Audio downloaded successfully.<br><br>

                <strong>${data.title}</strong>

                ${data.path
                                ? `<br><small>Saved to: ${data.path}</small>`
                                : ""
                            }
            `, "success");

                    }

                    console.log(data);

                } catch (err) {

                    setStatus(err.message, "error");

                } finally {

                    fetchBtn.disabled = false;
                    fetchBtn.innerHTML = "🎵 Fetch";

                }
            }

        </script>

</body>

</html>
