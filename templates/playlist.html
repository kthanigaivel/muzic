<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>YouTube Downloader</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:10px 20px;
    cursor:pointer;
}

#progress{
    width:100%;
    height:22px;
    background:#ddd;
    margin-top:20px;
    border-radius:20px;
    overflow:hidden;
}

#bar{
    width:0%;
    height:100%;
    background:#4caf50;
    transition:.25s;
}

#playlistInfo{
    margin-top:20px;
}

.thumb{
    width:160px;
    border-radius:6px;
}

#status{
    margin-top:15px;
    font-weight:bold;
}

#current{
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>YouTube Downloader</h2>

<input
id="playlist"
placeholder="Paste YouTube video or playlist URL">

<br>

<button onclick="preview()">Preview</button>
<button onclick="downloadPlaylist()">Download</button>

<div id="playlistInfo"></div>

<div id="progress">
<div id="bar"></div>
</div>

<div id="current"></div>
<div id="status"></div>

</div>

<script>

function getUrl(){
    return document.getElementById("playlist").value.trim();
}

async function preview(){

    const url=getUrl();

    if(!url){
        alert("Enter URL");
        return;
    }

    const r=await fetch(`/playlist-info?url=${encodeURIComponent(url)}`);
    const data=await r.json();

    let html=`
        <h3>${data.title}</h3>
        <p>${data.count} item(s)</p>
        <img class="thumb" src="${data.thumbnail}">
    `;

    if(data.videos){

        data.videos.forEach(v=>{

            html+=`
            <div style="margin-top:10px">
                <img src="${v.thumbnail}" width="90">
                ${v.title}
            </div>
            `;

        });

    }

    document.getElementById("playlistInfo").innerHTML=html;

}

async function downloadPlaylist(){

    const url=getUrl();

    if(!url){
        alert("Enter URL");
        return;
    }

    document.getElementById("bar").style.width="0%";
    document.getElementById("status").innerHTML="Starting...";

    const r=await fetch("/download",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            url:url
        })
    });

    const data=await r.json();

    const protocol=location.protocol==="https:"?"wss":"ws";

    const ws=new WebSocket(
        `${protocol}://${location.host}/ws/${data.job_id}`
    );

    ws.onmessage=(event)=>{

        const msg=JSON.parse(event.data);

        if(msg.overall_percent!==undefined){

            document.getElementById("bar").style.width=
                msg.overall_percent+"%";

        }

        if(msg.current!==undefined){

            document.getElementById("current").innerHTML=
                `Video ${msg.current} / ${msg.total}`;

        }

        let status=msg.status;

        if(msg.title){

            status+=`<br>${msg.title}`;

        }

        document.getElementById("status").innerHTML=status;

        if(msg.status==="completed"){

            document.getElementById("bar").style.width="100%";

            document.getElementById("status").innerHTML=
                "✅ Download completed";

            ws.close();

        }

        if(msg.status==="error"){

            document.getElementById("status").innerHTML=
                "❌ "+msg.message;

            ws.close();

        }

    };

    ws.onerror=()=>{

        document.getElementById("status").innerHTML=
            "WebSocket error";

    };

}
</script>

</body>
</html>
