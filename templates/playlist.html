<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>YouTube Downloader</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .15);
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #progress {
            width: 100%;
            height: 22px;
            background: #ddd;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
        }

        #bar {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: .25s;
        }

        #playlistInfo {
            margin-top: 20px;
        }

        .thumb {
            width: 160px;
            border-radius: 6px;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        #current {
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>YouTube Downloader</h2>

        <input id="playlist" placeholder="Paste YouTube video or playlist URL">

        <br>

        <button onclick="preview()">Preview</button>
        <button onclick="downloadPlaylist()">Download</button>

        <div id="playlistInfo"></div>

        <div id="progress">
            <div id="bar"></div>
        </div>

        <div id="current"></div>
        <div id="status"></div>

    </div>

    <script>
        function getToken() {
            return localStorage.getItem("token");
        }

        if (!token) {
            alert("Please login first.");
            window.location.href = "/default";
        }

        function getUrl() {
            return document.getElementById("playlist").value.trim();
        }

        async function preview() {

            const url = getUrl();

            if (!url) {
                alert("Enter URL");
                return;
            }

            const r = await fetch(
                `/yt/playlist-info?video_url=${encodeURIComponent(url)}`,
                {
                    headers: {
                        "Authorization": `Bearer ${getToken()}`
                    }
                }
            );
            if (r.status === 401) {
                localStorage.removeItem("token");
                location.href = "/default";
                return;
            }

            if (!r.ok) {
                const error = await r.text();
                document.getElementById("status").innerHTML = error;
                return;
            }
            const data = await r.json();

            let html = `
        <h3>${data.title}</h3>
        <p>${data.count} item(s)</p>
        <img class="thumb" src="${data.thumbnail}">
    `;

            if (data.videos) {

                data.videos.forEach(v => {

                    html += `
            <div style="margin-top:10px">
                <img src="${v.thumbnail}" width="90">
                ${v.title}
            </div>
            `;

                });

            }

            document.getElementById("playlistInfo").innerHTML = html;

        }

        async function downloadPlaylist() {

            const url = getUrl();

            if (!url) {
                alert("Enter URL");
                return;
            }

            document.getElementById("bar").style.width = "0%";
            document.getElementById("status").innerHTML = "Starting...";

            const r = await fetch("/yt/download", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${getToken()}`
                },
                body: JSON.stringify({
                    video_url: url
                })
            });

            const data = await r.json();

            const protocol = location.protocol === "https:" ? "wss" : "ws";

            const ws = new WebSocket(
                `${protocol}://${location.host}/yt/ws/${data.job_id}?token=${encodeURIComponent(getToken())}`
            );

            ws.onmessage = (event) => {

                const msg = JSON.parse(event.data);

                if (msg.overall_percent !== undefined) {
                    document.getElementById("bar").style.width =
                        msg.overall_percent + "%";
                }

                if (msg.current !== undefined) {
                    document.getElementById("current").innerHTML =
                        `Video ${msg.current} / ${msg.total}`;
                }

                // Already downloaded
                if (msg.status === "exists") {

                    document.getElementById("status").innerHTML =
                        `✅ Already downloaded<br>${msg.title}`;

                    return;
                }

                // Downloading
                if (msg.status === "downloading") {

                    document.getElementById("status").innerHTML =
                        `⬇ Downloading<br>${msg.title}`;

                    return;
                }

                // Converting
                if (msg.status === "converting") {

                    document.getElementById("status").innerHTML =
                        `🎵 Converting<br>${msg.title}`;

                    return;
                }

                // Completed
                if (msg.status === "completed") {

                    document.getElementById("bar").style.width = "100%";

                    document.getElementById("status").innerHTML =
                        "✅ Download completed";

                    ws.close();

                    return;
                }

                // Error
                if (msg.status === "error") {

                    document.getElementById("status").innerHTML =
                        "❌ " + msg.message;

                    ws.close();
                };
            };

        }
    </script>

</body>

</html>
