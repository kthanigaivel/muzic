<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Velora admin dashboard for user, song, download, and play analytics.">
    <title>Velora Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/static/images/music.png">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
            padding-top: 85px; /* Offset for fixed top navbar */
        }

        /* ==========================================
           FIXED TOP NAVIGATION MENU STYLES
           ========================================== */
        .top-nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #181818;
            border-bottom: 1px solid #282828;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.3rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .menu {
            display: flex;
            align-items: center;
        }

        .menu ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .menu li {
            padding: 8px 16px;
            background-color: #282828;
            color: #ffffff;
            white-space: nowrap;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            user-select: none;
        }

        .menu li:hover {
            background-color: #1DB954;
            color: #000000;
        }

        /* ==========================================
           DASHBOARD GRID & CONTENT
           ========================================== */
        .container {
            padding: 30px 24px 120px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #282828;
        }

        .card h3 {
            margin: 0;
            color: #aaa;
            font-size: 0.95rem;
        }

        .card h1 {
            color: #1DB954;
            margin: 10px 0 0;
            font-size: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e1e;
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #282828;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #282828;
            text-align: left;
        }

        th {
            background: #232323;
            color: #aaa;
            font-weight: 600;
        }

        img.cover {
            width: 42px;
            height: 42px;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 8px;
            object-fit: cover;
        }

        .section {
            margin-top: 30px;
        }

        .section h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #fff;
        }

        button {
            padding: 6px 12px;
            background: #282828;
            color: white;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #1DB954;
            color: #000;
        }

        /* Responsive Layout Adjustments */
        @media (max-width: 680px) {
            body {
                padding-top: 130px;
            }

            .top-nav-wrapper {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
            }

            .menu {
                width: 100%;
            }

            .menu ul {
                overflow-x: auto;
                width: 100%;
                padding-bottom: 4px;
            }
        }
    </style>
</head>

<body>

    <!-- FIXED TOP NAVIGATION BAR -->
    <header class="top-nav-wrapper">
        <div class="header">
            <h1>
                <img id="profile-image" src="/static/images/music.png" alt="Velora Logo">
                📊 Velora Admin Dashboard
            </h1>
            <span id="profile-name" style="display:none;"></span>
        </div>

        <nav class="menu">
            <ul>
                <li onclick="window.location.href='/';">🏠 Home</li>
                <li onclick="loadDashboard(); return false;">🔄 Refresh</li>
                <li onclick="cleanupDownloads(); return false;">🧹 Clean Downloads</li>
                <li onclick="window.location.href='/default';">👤 Profile</li>
            </ul>
        </nav>
    </header>

    <!-- MAIN DASHBOARD CONTENT -->
    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Users</h3>
                <h1 id="users">0</h1>
            </div>
            <div class="card">
                <h3>Songs</h3>
                <h1 id="songs">0</h1>
            </div>
            <div class="card">
                <h3>Downloads</h3>
                <h1 id="downloads">0</h1>
            </div>
            <div class="card">
                <h3>Plays</h3>
                <h1 id="plays">0</h1>
            </div>
        </div>

        <div class="section">
            <h2>Top Plays</h2>
            <table id="topPlays"></table>
        </div>

        <div class="section">
            <h2>Recent Downloads</h2>
            <table id="downloadsTable"></table>
        </div>

        <div class="section">
            <h2>Recent Plays</h2>
            <table id="playsTable"></table>
        </div>
    </div>

    <!-- AUDIO PLAYER -->
    <audio id="dashboardPlayer" controls
        style="width:100%; position:fixed; bottom:0; left:0; background:#181818; color:#fff; padding:8px; z-index:9999; border-top: 1px solid #282828;"></audio>

    <script>
        const token = localStorage.getItem("token");
        const usersEl = document.getElementById("users");
        const songsEl = document.getElementById("songs");
        const downloadsEl = document.getElementById("downloads");
        const playsEl = document.getElementById("plays");
        const downloadsTableEl = document.getElementById("downloadsTable");
        const playsTableEl = document.getElementById("playsTable");
        const topPlaysEl = document.getElementById("topPlays");

        async function loadDashboard() {
            if (!token) {
                console.error("Dashboard load failed: missing auth token.");
                return;
            }

            try {
                const r = await fetch("/admin/dashboard", {
                    headers: {
                        Authorization: "Bearer " + token,
                        "Content-Type": "application/json"
                    }
                });

                if (!r.ok) {
                    console.error("Dashboard load failed:", r.status, r.statusText);
                    return;
                }

                const d = await r.json();

                usersEl.textContent = d.overview.users;
                songsEl.textContent = d.overview.songs;
                downloadsEl.textContent = d.overview.downloads;
                playsEl.textContent = d.overview.plays;

                downloadsTableEl.innerHTML = "<tr><th>User</th><th>Song</th><th>Playlist</th><th>Time</th></tr>" +
                    d.recent_downloads.map(x => `
                        <tr>
                            <td>${x.username}</td>
                            <td><img class='cover' src='/media/${x.youtube_id}.jpg' onerror="this.style.display='none'">${x.title} <button onclick="playSong('${x.youtube_id}')">▶ Play</button></td>
                            <td>${x.playlist ?? "-"}</td>
                            <td>${new Date(x.downloaded_at).toLocaleString()}</td>
                        </tr>
                    `).join("");

                playsTableEl.innerHTML = "<tr><th>User</th><th>Song</th><th>Time</th></tr>" +
                    d.recent_plays.map(x => `
                        <tr>
                            <td>${x.username}</td>
                            <td><img class='cover' src='/media/${x.youtube_id}.jpg' onerror="this.style.display='none'">${x.title}</td>
                            <td>${new Date(x.played_at).toLocaleString()}</td>
                        </tr>
                    `).join("");

                topPlaysEl.innerHTML = "<tr><th>Song</th><th>Count</th><th>Action</th></tr>" +
                    d.top_plays.map(x =>
                        `<tr>
                            <td>${x.title}</td>
                            <td>${x.count}</td>
                            <td><button onclick="playSong('${x.youtube_id}')">▶ Play</button></td>
                        </tr>`).join("");
            } catch (error) {
                console.error("Dashboard load failed:", error);
            }
        }

        async function playSong(youtubeId) {
            try {
                const response = await fetch(
                    `/songs/play?youtube_id=${encodeURIComponent(youtubeId)}`,
                    {
                        method: "POST",
                        headers: {
                            Authorization: `Bearer ${token}`
                        }
                    }
                );

                if (!response.ok) {
                    console.warn("Failed to record play:", await response.text());
                }
            } catch (err) {
                console.error("Record play error:", err);
            }

            try {
                const dashPlayer = document.getElementById("dashboardPlayer");
                if (!dashPlayer) {
                    console.error("Dashboard player element missing.");
                    return;
                }
                dashPlayer.src = `/media/${youtubeId}.mp3`;
                dashPlayer.play().catch(e => console.error("Playback failed:", e));
            } catch (err) {
                console.error("Player error:", err);
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);

        async function cleanupDownloads() {
            if (!token) {
                alert('Missing auth token. Please login as admin.');
                return;
            }

            if (!confirm('Run cleanup of orphaned downloads? This will permanently delete files.')) {
                return;
            }

            try {
                const res = await fetch('/admin/cleanup/downloads', {
                    method: 'POST',
                    headers: {
                        Authorization: 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                if (!res.ok) {
                    const txt = await res.text();
                    alert('Cleanup failed: ' + res.status + ' ' + txt);
                    return;
                }

                const data = await res.json();
                alert(`Cleanup complete. Kept: ${data.kept}, Deleted: ${data.deleted}`);
                loadDashboard();
            } catch (err) {
                console.error('Cleanup error', err);
                alert('Cleanup failed: ' + err.message);
            }
        }
    </script>
</body>

</html>
