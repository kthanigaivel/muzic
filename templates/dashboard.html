<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Velora admin dashboard for user, song, download, and play analytics.">
    <title>Velora Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/static/images/music.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
        }

        header {
            padding: 20px;
            background: #181818;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        header h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .container {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px
        }

        .card h3 {
            margin: 0;
            color: #aaa
        }

        .card h1 {
            color: #1DB954;
            margin: 10px 0 0
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e1e;
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: left
        }

        th {
            background: #232323
        }

        img.cover {
            width: 42px;
            height: 42px;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 8px
        }

        .section {
            margin-top: 25px
        }

        .back {
            display: inline-block;
            padding: 10px 18px;
            background: #282828;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            transition: background .2s;
        }

        .back:hover {
            background: #1DB954;
        }
    </style>
</head>

<body>
    <header>
        <h2>📊 Velora Admin Dashboard</h2>
        <div class="header-actions">
            <button class="back" onclick="loadDashboard()">
                🔄 Refresh
            </button>
            <button class="back" onclick="cleanupDownloads()">
                🧹 Clean Downloads
            </button>
            <a href="/" class="back">
                🏠 Home
            </a>
        </div>
    </header>
    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Users</h3>
                <h1 id="users">0</h1>
            </div>
            <div class="card">
                <h3>Songs</h3>
                <h1 id="songs">0</h1>
            </div>
            <div class="card">
                <h3>Downloads</h3>
                <h1 id="downloads">0</h1>
            </div>
            <div class="card">
                <h3>Plays</h3>
                <h1 id="plays">0</h1>
            </div>
        </div>

        <div class="section">
            <h2>Top Plays</h2>
            <table id="topPlays"></table>
        </div>

        <div class="section">
            <h2>Recent Downloads</h2>
            <table id="downloadsTable"></table>
        </div>
        <div class="section">
            <h2>Recent Plays</h2>
            <table id="playsTable"></table>
        </div>


    </div>
    <script>
        const token = localStorage.getItem("token");
        const usersEl = document.getElementById("users");
        const songsEl = document.getElementById("songs");
        const downloadsEl = document.getElementById("downloads");
        const playsEl = document.getElementById("plays");
        const downloadsTableEl = document.getElementById("downloadsTable");
        const playsTableEl = document.getElementById("playsTable");
        const topPlaysEl = document.getElementById("topPlays");

        async function loadDashboard() {
            if (!token) {
                console.error("Dashboard load failed: missing auth token.");
                return;
            }

            try {
                const r = await fetch("/admin/dashboard", {
                    headers: {
                        Authorization: "Bearer " + token,
                        "Content-Type": "application/json"
                    }
                });

                if (!r.ok) {
                    console.error("Dashboard load failed:", r.status, r.statusText);
                    return;
                }

                const d = await r.json();

                usersEl.textContent = d.overview.users;
                songsEl.textContent = d.overview.songs;
                downloadsEl.textContent = d.overview.downloads;
                playsEl.textContent = d.overview.plays;

                downloadsTableEl.innerHTML = "<tr><th>User</th><th>Song</th><th>Playlist</th><th>Time</th></tr>" +
                    d.recent_downloads.map(x => `
                        <tr>
                            <td>${x.username}</td>
                            <td><img class='cover' src='/media/${x.youtube_id}.jpg' onerror="this.style.display='none'">${x.title} <button onclick="playSong('${x.youtube_id}')">▶ Play</button></td>
                            <td>${x.playlist ?? "-"}</td>
                            <td>${new Date(x.downloaded_at).toLocaleString()}</td>
                        </tr>
                    `).join("");

                playsTableEl.innerHTML = "<tr><th>User</th><th>Song</th><th>Time</th></tr>" +
                    d.recent_plays.map(x => `
                        <tr>
                            <td>${x.username}</td>
                            <td><img class='cover' src='/media/${x.youtube_id}.jpg' onerror="this.style.display='none'">${x.title}</td>
                            <td>${new Date(x.played_at).toLocaleString()}</td>
                        </tr>
                    `).join("");

                topPlaysEl.innerHTML = "<tr><th>Song</th><th>Count</th></tr>" +
                    d.top_plays.map(x =>
                        `<tr>
                    <td>${x.title}
                    </td>
                    <td>${x.count}
                    <td>
                        <button onclick="playSong('${x.youtube_id}')">▶ Play</button>
           
                    </td>
                    </tr>`).join("");
            } catch (error) {
                console.error("Dashboard load failed:", error);
            }
        }

        async function playSong(youtubeId) {
            // Record play in backend (non-blocking for playback)
            try {
                const response = await fetch(
                    `/songs/play?youtube_id=${encodeURIComponent(youtubeId)}`,
                    {
                        method: "POST",
                        headers: {
                            Authorization: `Bearer ${token}`
                        }
                    }
                );

                if (!response.ok) {
                    console.warn("Failed to record play:", await response.text());
                }
            } catch (err) {
                console.error("Record play error:", err);
            }

            // Play inline on the dashboard
            try {
                const dashPlayer = document.getElementById("dashboardPlayer");
                if (!dashPlayer) {
                    console.error("Dashboard player element missing.");
                    return;
                }
                dashPlayer.src = `/media/${youtubeId}.mp3`;
                dashPlayer.play().catch(e => console.error("Playback failed:", e));
            } catch (err) {
                console.error("Player error:", err);
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);

        async function cleanupDownloads() {
            if (!token) {
                alert('Missing auth token. Please login as admin.');
                return;
            }

            if (!confirm('Run cleanup of orphaned downloads? This will permanently delete files.')) {
                return;
            }

            try {
                const res = await fetch('/admin/cleanup/downloads', {
                    method: 'POST',
                    headers: {
                        Authorization: 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                if (!res.ok) {
                    const txt = await res.text();
                    alert('Cleanup failed: ' + res.status + ' ' + txt);
                    return;
                }

                const data = await res.json();
                alert(`Cleanup complete. Kept: ${data.kept}, Deleted: ${data.deleted}`);
                loadDashboard();
            } catch (err) {
                console.error('Cleanup error', err);
                alert('Cleanup failed: ' + err.message);
            }
        }
    </script>
    <audio id="dashboardPlayer" controls style="width:100%;position:fixed;bottom:0;left:0;background:#181818;color:#fff;padding:8px;z-index:9999;"></audio>
</body>

</html>
