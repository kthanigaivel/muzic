<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/x-icon" href="/static/images/music.png">

    <title>Muzic App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #121212;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px
        }

        .card {
            background: #181818;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .5)
        }

        .logo {
            color: #1DB954;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px
        }

        h2 {
            text-align: center;
            margin-bottom: 10px
        }

        .subtitle {
            text-align: center;
            color: #b3b3b3;
            margin-bottom: 30px
        }

        .view {
            display: none
        }

        .view.active {
            display: block
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: none;
            border-radius: 10px;
            background: #282828;
            color: #fff
        }

        input:focus {
            outline: 2px solid #1DB954
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: #1DB954;
            color: #fff;
            font-weight: bold;
            cursor: pointer
        }

        button:disabled {
            opacity: .6
        }

        #status {
            margin-top: 15px;
            text-align: center;
            min-height: 22px
        }

        .success {
            color: #1DB954
        }

        .error {
            color: #ff6666
        }

        .register {
            text-align: center;
            margin-top: 20px;
            color: #b3b3b3
        }

        .register a {
            color: #1DB954;
            text-decoration: none
        }

        #profileView p {
            margin: 15px 0
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="logo">🎵 MUZIC</div>

            <div id="fetchView" class="view active">
                <h2>Fetch YouTube</h2>

                <div style="margin-bottom:18px; ">
                    <input id="fetchUrl" type="url" placeholder="Paste YouTube Video or Playlist URL">
                </div>


                <button id="fetchBtn" type="button" style="background:#FFBF00;" class="image-btn">
                    🎵 Fetch
                </button>

                <div id="fetchStatus"></div>


                <p style="margin-top:18px;text-align:center;"><button type="button" id="backFromFetch">🏠 Back To
                        Home</button>
                </p>

            </div>
        </div>
    </div>
    <script>
        const API_URL = window.location.origin;

        const $ = id => document.getElementById(id);

        $("backFromFetch").onclick = () => {
            window.location.href = API_URL;
        };

        $("fetchBtn").onclick = fetchMusic;

        function setFetchStatus(message, isError = false) {
            const s = $("fetchStatus");
            s.innerHTML = message;
            s.className = isError ? "error" : "success";
        }

        async function fetchMusic() {
            let url = $("fetchUrl").value.trim();

            if (!url) {
                setFetchStatus("Please enter a YouTube URL.", true);
                return;
            }

            const token = localStorage.getItem("token") ||
                localStorage.getItem("access_token");

            if (!token) {
                alert("Please login first.");
                return;
            }

            const btn = $("fetchBtn");
            btn.disabled = true;
            btn.textContent = "⏳ Fetching...";

            setFetchStatus("");

            try {
                const resp = await fetch(
                    `${API_URL}/fetch/youtube?url=${encodeURIComponent(url)}`,
                    {
                        method: "POST",
                        headers: {
                            Authorization: `Bearer ${token}`
                        }
                    }
                );

                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.detail || "Fetch failed.");
                }

                $("fetchUrl").value = "";

                if (data.type === "playlist") {
                    let html = `
        <div style="text-align:left">
            <p><strong>✅ Playlist:</strong> ${data.playlist}</p>
            <p><strong>Total Songs:</strong> ${data.count}</p>
            <hr style="margin:10px 0;border-color:#333;">
    `;

                    data.songs.forEach((song, index) => {
                        html += `
            <div style="margin:8px 0">
                ${index + 1}. ${song.title}
                <span style="color:${song.status === "downloaded" ? "#1DB954" : "#ffbf00"
                            }">
                    (${song.status})
                </span>
            </div>
        `;
                    });

                    html += "</div>";

                    setFetchStatus(html);
                } else {
                    setFetchStatus(
                        `✅ Audio downloaded successfully.<br><strong>${data.title}</strong>`
                    );
                }

            } catch (err) {
                setFetchStatus(err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = "🎵 Fetch";
            }
        }
    </script>
</body>

</html>
