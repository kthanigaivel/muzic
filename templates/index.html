<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velora - Music Library</title>
  <link rel="icon" type="image/x-icon" href="/static/images/music.png">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 15px;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding-top: 90px;
      min-height: 100vh;
    }

    /* ==========================================
       FIXED TOP NAVIGATION MENU STYLES
       ========================================== */
    .top-nav-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #181818;
      border-bottom: 1px solid #282828;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.3rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .menu {
      display: flex;
      align-items: center;
    }

    .menu ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .menu li {
      padding: 8px 16px;
      background-color: #282828;
      color: #ffffff;
      white-space: nowrap;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      user-select: none;
    }

    .menu li:hover {
      background-color: #1DB954;
      color: #000000;
    }

    /* ==========================================
       MAIN LAYOUT & CONTENT
       ========================================== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 20px 240px 20px; /* Spacing for floating player */
    }

    .greeting-title {
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 20px;
      color: #ffffff;
    }

    /* Controls & Search Bar */
    .toolbar-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
    }

    .filter-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill-btn {
      padding: 8px 18px;
      border-radius: 20px;
      background-color: #1e1e1e;
      border: 1px solid #333333;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .pill-btn:hover {
      background-color: #282828;
      border-color: #1DB954;
    }

    .search-container {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .search-wrapper {
      position: relative;
      flex-grow: 1;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      width: 20px;
      height: 20px;
      color: #888888;
      pointer-events: none;
    }

    .search {
      width: 100%;
      padding: 12px 16px 12px 44px;
      font-size: 15px;
      color: #ffffff;
      background-color: #1e1e1e;
      border: 1px solid #333333;
      border-radius: 30px;
      outline: none;
      transition: border-color 0.2s ease-in-out;
    }

    .search:focus {
      border-color: #1DB954;
    }

    .search-button {
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      color: #000000;
      background-color: #1DB954;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .search-button:hover {
      background-color: #1ed760;
    }

    /* Song List Styles */
    #song-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .song-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 16px;
      background-color: #1e1e1e;
      border: 1px solid #282828;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .song-item:hover {
      background-color: #252525;
      border-color: #333333;
    }

    .song-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
      background-color: #282828;
      flex-shrink: 0;
    }

    .song-title {
      font-weight: bold;
      font-size: 15px;
      color: #ffffff;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .favorite {
      font-size: 20px;
      padding: 5px;
      user-select: none;
      transition: transform 0.1s ease;
    }

    .favorite:hover {
      transform: scale(1.2);
    }

    /* ==========================================
       DARK FIXED FLOATING PLAYER WIDGET
       ========================================== */
    .player {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 340px;
      background-color: #181818;
      border: 1px solid #282828;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      border-radius: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(10px);
    }

    .player-details {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .current-cover {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background-color: #282828;
    }

    .song-name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player audio {
      width: 100%;
      height: 36px;
      accent-color: #1DB954;
      border-radius: 6px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .controls .btn,
    .controls #playerFavorite {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: bold;
      border-radius: 20px;
      border: 1px solid #333333;
      background: #282828;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .controls .btn:hover,
    .controls #playerFavorite:hover {
      background: #1DB954;
      color: #000000;
      border-color: #1DB954;
    }

    .footer {
      border-top: 1px solid #282828;
      color: #888888;
      text-align: center;
      padding: 20px 0;
      font-size: 13px;
      margin-top: 40px;
    }

    /* Responsive adjustments */
    @media (max-width: 680px) {
      body {
        padding-top: 130px;
      }

      .top-nav-wrapper {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 16px;
      }

      .menu {
        width: 100%;
      }

      .menu ul {
        overflow-x: auto;
        width: 100%;
        padding-bottom: 4px;
      }

      .player {
        left: 15px;
        right: 15px;
        width: auto;
        bottom: 15px;
      }
    }
  </style>
</head>

<body>

  <!-- FIXED TOP NAVIGATION BAR -->
  <div class="top-nav-wrapper">
    <div class="header">
      <h1>
        <img id="profile-image" src="/static/images/music.png" alt="Velora Logo">
        Velora
      </h1>
      <span id="profile-name" style="display:none;"></span>
    </div>

    <nav class="menu">
      <ul>
        <li onclick="loadSongs(); return false;">🏠 Home</li>
        <li onclick="window.location.href='/dash';">📊 Dashboard</li>
        <li onclick="window.location.href='/manager';">🗑 Remove Songs</li>
        <li onclick="window.location.href='/default';">👤 Profile</li>
      </ul>
    </nav>
  </div>

  <!-- MAIN CONTAINER -->
  <div class="container">
    <h2 id="greeting" class="greeting-title">Hello</h2>

    <div class="toolbar-container">
      <div class="filter-pills">
        <button class="pill-btn" onclick="loadSongs();">🎵 All Tracks</button>
        <button class="pill-btn" onclick="showFavorites();">❤️ Favorites</button>
        <button class="pill-btn" onclick="showShuffle();">🔀 Shuffle</button>
      </div>

      <form class="search-container" onsubmit="event.preventDefault(); filterSongs();">
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input id="search" class="search" type="search" placeholder="Search for tracks, artists..." aria-label="Search"
            onkeyup="filterSongs()">
        </div>
        <button type="submit" class="search-button">Search</button>
      </form>
    </div>

    <ul id="song-list"></ul>

    <div class="footer">
      <p>&copy; 2026 Velora. All rights reserved.</p>
    </div>
  </div>

  <!-- FLOATING PLAYER CONTAINER -->
  <div class="player">
    <div class="player-details">
      <img id="current-cover" class="current-cover" src="/static/images/default-cover.png" alt="Cover">
      <div id="song-name" class="song-name">Welcome to Velora</div>
    </div>

    <audio id="player" controls></audio>

    <div class="controls">
      <button class="btn" onclick="prevSong()">⏮ Prev</button>
      <button class="btn" onclick="togglePlay()" id="playBtn">▶ Play</button>
      <button class="btn" onclick="nextSong()">Next ⏭</button>
      <button id="playerFavorite" onclick="toggleCurrentFavorite()">🤍</button>
    </div>
  </div>

  <script>
    // ==========================================
    // Global State & Configuration
    // ==========================================
    const TOKEN = localStorage.getItem("token");

    function getToken() {
      return localStorage.getItem("token");
    }

    function getAuthHeaders() {
      const token = getToken();
      if (!token) {
        logout();
        return null;
      }
      return {
        "Authorization": `Bearer ${token}`
      };
    }

    let songs = [];
    let filteredSongs = [];
    let favorites = new Set();
    let currentUser = null;

    let currentSong = null;
    let currentIndex = -1;
    let audio = null;
    let playBtn = null;
    let lastPlayedHistory = null;

    // ==========================================
    // DOM Initialization
    // ==========================================
    document.addEventListener("DOMContentLoaded", async () => {
      audio = document.getElementById("player") || document.getElementById("myAudio");
      playBtn = document.getElementById("playBtn");

      if (audio) {
        initializePlayer();
      }

      updateGreeting();

      await loadCurrentUser();
      await loadFavoriteIds();
      await loadSongs();
    });

    // ==========================================
    // Authentication & User Profile
    // ==========================================
    async function loadCurrentUser() {
      try {
        const authHeaders = getAuthHeaders();
        if (!authHeaders) return;

        const response = await fetch("/auth/me", {
          headers: {
            ...authHeaders,
            "Accept": "application/json"
          }
        });

        if (response.status === 401) {
          logout();
          return;
        }

        if (!response.ok) throw new Error("Failed to load user info");

        const user = await response.json();
        currentUser = user;

        const profileName = document.getElementById("profile-name");
        if (profileName) profileName.textContent = user.username;

        const profileImg = document.getElementById("profile-image");
        if (profileImg) {
          profileImg.src = `https://ui-avatars.com/api/?background=1DB954&color=fff&name=${encodeURIComponent(user.username)}`;
        }

        updateGreeting();
      } catch (err) {
        console.error(err);
        logout();
      }
    }

    function updateGreeting() {
      const greetingEl = document.getElementById("greeting");
      if (!greetingEl) return;

      const hour = new Date().getHours();
      let greeting = "Hello";

      if (hour >= 5 && hour < 12) {
        greeting = "Good Morning";
      } else if (hour >= 12 && hour < 17) {
        greeting = "Good Afternoon";
      } else if (hour >= 17 && hour < 21) {
        greeting = "Good Evening";
      } else {
        greeting = "Good Night";
      }

      const capitalize = value => value
        .split(" ")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");

      const name = currentUser?.username ? `, ${capitalize(currentUser.username)}` : "";
      greetingEl.textContent = `${greeting}${name}`;
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("access_token");
      localStorage.removeItem("token_type");
      localStorage.removeItem("user");

      window.location.href = "/default";
    }

    // ==========================================
    // Songs & Favorites Data Fetching
    // ==========================================
    async function loadFavoriteIds() {
      try {
        const authHeaders = getAuthHeaders();
        if (!authHeaders) return;

        const response = await fetch("/favorite", {
          headers: {
            ...authHeaders,
            "Accept": "application/json"
          }
        });

        if (response.status === 401) {
          logout();
          return;
        }

        if (!response.ok) throw new Error("Failed to load favorites");

        const data = await response.json();
        favorites = new Set(data.map(song => song.youtube_id));
      } catch (err) {
        console.error(err);
      }
    }

    async function loadSongs() {
      try {
        const authHeaders = getAuthHeaders();
        if (!authHeaders) return;

        const response = await fetch("/songs/", {
          headers: {
            ...authHeaders,
            "Accept": "application/json"
          }
        });

        if (response.status === 401) {
          logout();
          return;
        }

        if (!response.ok) throw new Error("Unable to load songs");

        songs = await response.json();
        filteredSongs = [...songs];

        renderSongs(filteredSongs);
      } catch (err) {
        console.error(err);
      }
    }

    // ==========================================
    // Filtering & Sorting
    // ==========================================
    function showFavorites() {
      filteredSongs = songs.filter(song => favorites.has(song.youtube_id));
      renderSongs(filteredSongs);
    }

    function showShuffle() {
      const shuffled = [...songs];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      filteredSongs = shuffled;
      renderSongs(filteredSongs);
    }

    function filterSongs() {
      const searchInput = document.getElementById("search");
      if (!searchInput) return;

      const q = searchInput.value.toLowerCase();
      filteredSongs = songs.filter(song =>
        song.filename.toLowerCase().includes(q) ||
        song.youtube_id.toLowerCase().includes(q)
      );

      renderSongs(filteredSongs);
    }

    // ==========================================
    // UI Rendering
    // ==========================================
    function renderSongs(songList = filteredSongs) {
      if (!Array.isArray(songList)) {
        console.warn("renderSongs expected an array, but received:", songList);
        return;
      }

      const listContainer = document.getElementById("song-list");
      if (listContainer) {
        listContainer.innerHTML = "";
        
        if (songList.length === 0) {
          listContainer.innerHTML = `<li style="padding: 30px; text-align: center; color: #888888;">No songs found.</li>`;
          return;
        }

        songList.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = "song-item";
          li.onclick = () => playSong(index);

          const img = document.createElement("img");
          img.src = song.cover_url || `/media/${song.youtube_id}.jpg`;
          img.alt = song.filename || "";
          img.onerror = () => { img.src = "/static/images/default-cover.png"; };

          const details = document.createElement("div");
          details.style.flex = "1";
          details.style.minWidth = "0";
          details.innerHTML = `
                <div class="song-title">
                    ${song.filename.split("|").slice(1).join(" ") || song.filename}
                </div>
                <div class="song-artist" style="color: #888888; font-size: 13px;">
                    ID: ${song.youtube_id}
                </div>
            `;

          const favBtn = document.createElement("div");
          favBtn.className = "favorite";
          favBtn.style.cursor = "pointer";
          favBtn.innerHTML = favorites.has(song.youtube_id) ? "❤️" : "🤍";
          favBtn.onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(song.youtube_id);
          };

          li.appendChild(img);
          li.appendChild(details);
          li.appendChild(favBtn);
          listContainer.appendChild(li);
        });
      }
    }

    // ==========================================
    // Favorite Actions
    // ==========================================
    async function toggleFavorite(youtube_id) {
      try {
        const method = favorites.has(youtube_id) ? "DELETE" : "POST";
        const authHeaders = getAuthHeaders();
        if (!authHeaders) return;

        const response = await fetch(`/favorite/${youtube_id}`, {
          method,
          headers: authHeaders
        });

        if (!response.ok) throw new Error("Failed to update favorite status");

        if (method === "POST") {
          favorites.add(youtube_id);
        } else {
          favorites.delete(youtube_id);
        }

        updatePlayerFavorite();
        renderSongs(filteredSongs);
      } catch (err) {
        console.error(err);
      }
    }

    async function toggleCurrentFavorite() {
      if (!currentSong) return;
      await toggleFavorite(currentSong.youtube_id);
    }

    function updatePlayerFavorite() {
      const btn = document.getElementById("playerFavorite");
      if (!btn) return;

      if (!currentSong) {
        btn.textContent = "🤍";
        return;
      }

      btn.textContent = favorites.has(currentSong.youtube_id) ? "❤️" : "🤍";
    }

    // ==========================================
    // Audio Player Logic
    // ==========================================
    function initializePlayer() {
      if (!audio) return;

      audio.addEventListener("play", () => {
        if (playBtn) playBtn.innerHTML = "⏸";
      });

      audio.addEventListener("pause", () => {
        if (playBtn) playBtn.innerHTML = "▶";
      });

      audio.addEventListener("ended", () => {
        nextSong();
      });

      audio.addEventListener("volumechange", () => {
        localStorage.setItem("velora_volume", audio.volume);
        localStorage.setItem("velora_muted", audio.muted);
      });

      const savedVolume = localStorage.getItem("velora_volume");
      if (savedVolume !== null) {
        audio.volume = parseFloat(savedVolume);
      } else {
        audio.volume = 0.7;
      }

      const muted = localStorage.getItem("velora_muted");
      if (muted !== null) {
        audio.muted = muted === "true";
      }
    }

    function safePlay() {
      if (!audio) return;
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          if (playBtn) playBtn.innerText = "⏸";
        }).catch((error) => {
          console.log("Playback interrupted safely:", error);
          if (playBtn) playBtn.innerText = "▶";
        });
      }
    }

    function playSong(songOrIndex) {
      const activeList = filteredSongs.length > 0 ? filteredSongs : songs;
      if (activeList.length === 0) return;

      if (typeof songOrIndex === "number") {
        if (songOrIndex < 0 || songOrIndex >= activeList.length) return;
        currentIndex = songOrIndex;
        currentSong = activeList[songOrIndex];
      } else {
        currentSong = songOrIndex;
        currentIndex = activeList.findIndex(
          s => s.youtube_id === currentSong.youtube_id
        );
      }

      lastPlayedHistory = null;
      updatePlayerFavorite();

      if (audio) {
        audio.src = `/media/${currentSong.youtube_id}.mp3`;
        safePlay();
      }

      // Update player UI elements
      const coverEl = document.getElementById("current-cover");
      if (coverEl) coverEl.src = `/media/${currentSong.youtube_id}.jpg`;

      const titleEl = document.getElementById("song-name");
      if (titleEl) titleEl.textContent = currentSong.filename.split("|").slice(1).join(" ") || currentSong.filename;
    }

    function togglePlay() {
      if (!audio) return;

      if (!currentSong || !audio.src) {
        const activeList = filteredSongs.length > 0 ? filteredSongs : songs;
        if (activeList.length > 0) {
          playSong(0);
        } else {
          alert("Please select a song first.");
        }
        return;
      }

      if (audio.paused) {
        safePlay();
      } else {
        audio.pause();
        if (playBtn) playBtn.innerText = "▶";
      }
    }

    function nextSong() {
      const activeList = filteredSongs.length > 0 ? filteredSongs : songs;
      if (activeList.length === 0) return;

      currentIndex++;
      if (currentIndex >= activeList.length) {
        currentIndex = 0;
      }

      playSong(currentIndex);
    }

    function prevSong() {
      const activeList = filteredSongs.length > 0 ? filteredSongs : songs;
      if (activeList.length === 0) return;

      currentIndex--;
      if (currentIndex < 0) {
        currentIndex = activeList.length - 1;
      }

      playSong(currentIndex);
    }

    // Keyboard Shortcuts
    document.addEventListener("keydown", function (e) {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") {
        return;
      }

      switch (e.code) {
        case "Space":
          e.preventDefault();
          togglePlay();
          break;

        case "ArrowRight":
          nextSong();
          break;

        case "ArrowLeft":
          prevSong();
          break;

        case "KeyF":
          const searchInput = document.getElementById("search");
          if (searchInput) {
            e.preventDefault();
            searchInput.focus();
          }
          break;
      }
    });
  </script>

</body>

</html>
